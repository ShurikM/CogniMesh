<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="gw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7cf8"/>
      <stop offset="100%" stop-color="#6d5fd6"/>
    </linearGradient>
    <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b7cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b7cf8" stop-opacity="0"/>
    </radialGradient>
    <style>
      /* ============================================
         TOP ROW — "With CogniMesh" animations
         ============================================ */

      /* Request dot: Agent (80) → CogniMesh (450) → DB (800)
         Then response dot: DB (800) → CogniMesh (450) → Agent (80)
         6s total cycle */

      /* Phase 1: Blue request dot travels Agent → CogniMesh (0-1s) */
      @keyframes topRequestOut {
        0%   { transform: translateX(80px); opacity: 0; }
        3%   { opacity: 1; }
        50%  { transform: translateX(450px); opacity: 1; }
        51%  { opacity: 0; }
        100% { opacity: 0; transform: translateX(450px); }
      }
      .top-req-dot-1 {
        animation: topRequestOut 2s ease-in-out infinite;
        animation-delay: 0s;
      }

      /* Phase 2: Teal dot travels CogniMesh → DB (1-2s) */
      @keyframes topRequestThrough {
        0%   { transform: translateX(450px); opacity: 0; }
        3%   { opacity: 1; }
        50%  { transform: translateX(800px); opacity: 1; }
        51%  { opacity: 0; }
        100% { opacity: 0; transform: translateX(800px); }
      }
      .top-req-dot-2 {
        animation: topRequestThrough 2s ease-in-out infinite;
        animation-delay: 1s;
      }

      /* Phase 3: Green response dot travels DB → CogniMesh (2-3s) */
      @keyframes topResponseBack1 {
        0%   { transform: translateX(800px); opacity: 0; }
        3%   { opacity: 1; }
        50%  { transform: translateX(450px); opacity: 1; }
        51%  { opacity: 0; }
        100% { opacity: 0; transform: translateX(450px); }
      }
      .top-resp-dot-1 {
        animation: topResponseBack1 2s ease-in-out infinite;
        animation-delay: 2s;
      }

      /* Phase 4: Green response dot travels CogniMesh → Agent (3-4s) */
      @keyframes topResponseBack2 {
        0%   { transform: translateX(450px); opacity: 0; }
        3%   { opacity: 1; }
        50%  { transform: translateX(80px); opacity: 1; }
        51%  { opacity: 0; }
        100% { opacity: 0; transform: translateX(80px); }
      }
      .top-resp-dot-2 {
        animation: topResponseBack2 2s ease-in-out infinite;
        animation-delay: 3s;
      }

      /* Success label "200 OK" fade in at 3-4s, hold, fade out */
      @keyframes topSuccessLabel {
        0%   { opacity: 0; }
        50%  { opacity: 0; }
        58%  { opacity: 1; }
        83%  { opacity: 1; }
        100% { opacity: 0; }
      }
      .top-success-label {
        animation: topSuccessLabel 6s ease-in-out infinite;
      }

      /* Lineage label fade in at 3-4s */
      @keyframes topLineageLabel {
        0%   { opacity: 0; }
        50%  { opacity: 0; }
        58%  { opacity: 0.7; }
        83%  { opacity: 0.7; }
        100% { opacity: 0; }
      }
      .top-lineage-label {
        animation: topLineageLabel 6s ease-in-out infinite;
      }

      /* CogniMesh hub pulse when request passes through (1-2s) */
      @keyframes hubPulse {
        0%   { transform: translate(450px, 120px) scale(1); }
        12%  { transform: translate(450px, 120px) scale(1); }
        20%  { transform: translate(450px, 120px) scale(1.08); }
        30%  { transform: translate(450px, 120px) scale(1); }
        45%  { transform: translate(450px, 120px) scale(1.06); }
        55%  { transform: translate(450px, 120px) scale(1); }
        100% { transform: translate(450px, 120px) scale(1); }
      }
      .hub-group {
        transform-origin: 0 0;
        animation: hubPulse 6s ease-in-out infinite;
      }

      /* Hub glow pulse */
      @keyframes hubGlowPulse {
        0%   { opacity: 0.3; }
        15%  { opacity: 0.3; }
        22%  { opacity: 0.8; }
        35%  { opacity: 0.3; }
        100% { opacity: 0.3; }
      }
      .hub-glow {
        animation: hubGlowPulse 6s ease-in-out infinite;
      }

      /* Green checkmark fade */
      @keyframes checkFade {
        0%   { opacity: 0; }
        55%  { opacity: 0; }
        62%  { opacity: 1; }
        83%  { opacity: 1; }
        100% { opacity: 0; }
      }
      .top-check {
        animation: checkFade 6s ease-in-out infinite;
      }

      /* ============================================
         BOTTOM ROW — "Without CogniMesh" animations
         ============================================ */

      /* Request dot: Agent (80) → gap (450), turns red, bounces back */
      @keyframes botRequestOut {
        0%   { transform: translateX(80px); opacity: 0; }
        3%   { opacity: 1; }
        50%  { transform: translateX(420px); opacity: 1; }
        51%  { opacity: 0; }
        100% { opacity: 0; transform: translateX(420px); }
      }
      .bot-req-dot {
        animation: botRequestOut 2s ease-in-out infinite;
        animation-delay: 0.3s;
      }

      /* Red bounce dot: reaches gap, turns red, bounces back */
      @keyframes botBounce {
        0%   { transform: translateX(420px); opacity: 0; }
        5%   { opacity: 1; }
        15%  { transform: translateX(440px); }
        50%  { transform: translateX(420px); opacity: 1; }
        100% { transform: translateX(80px); opacity: 0.3; }
      }
      .bot-bounce-dot {
        animation: botBounce 2.5s ease-in-out infinite;
        animation-delay: 2.3s;
      }

      /* Red X at gap */
      @keyframes redXFade {
        0%   { opacity: 0; }
        35%  { opacity: 0; }
        42%  { opacity: 1; }
        70%  { opacity: 1; }
        85%  { opacity: 0; }
        100% { opacity: 0; }
      }
      .bot-red-x {
        animation: redXFade 6s ease-in-out infinite;
        animation-delay: 0.3s;
      }

      /* "404" label fade */
      @keyframes bot404Label {
        0%   { opacity: 0; }
        55%  { opacity: 0; }
        62%  { opacity: 1; }
        83%  { opacity: 1; }
        100% { opacity: 0; }
      }
      .bot-404-label {
        animation: bot404Label 6s ease-in-out infinite;
        animation-delay: 0.3s;
      }

      /* "no endpoint" label */
      .bot-noep-label {
        animation: bot404Label 6s ease-in-out infinite;
        animation-delay: 0.3s;
      }

      /* Agent speech bubble subtle pulse */
      @keyframes bubblePulse {
        0%   { opacity: 0.85; }
        50%  { opacity: 1; }
        100% { opacity: 0.85; }
      }
      .speech-bubble {
        animation: bubblePulse 3s ease-in-out infinite;
      }

      /* Dashed line drawing for top row */
      @keyframes dashFlow {
        0%   { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      .flow-line-top {
        stroke-dasharray: 8 4;
        animation: dashFlow 1.5s linear infinite;
      }
      .flow-line-bot {
        stroke-dasharray: 8 4;
        animation: dashFlow 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="400" fill="#0d0f12" rx="12"/>

  <!-- ============================================
       TITLE
       ============================================ -->
  <text x="450" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">CogniMesh</text>
  <text x="450" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">The governed data layer for AI agents</text>

  <!-- Divider line -->
  <line x1="30" y1="210" x2="870" y2="210" stroke="#1f2937" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============================================
       TOP ROW — "With CogniMesh"
       ============================================ -->

  <!-- Section label -->
  <text x="40" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4ade80">With CogniMesh</text>

  <!-- === AGENT (top row, centered at x=80, y=120) === -->
  <!-- Agent circle body -->
  <circle cx="80" cy="108" r="7" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <path d="M68,130 a12,8 0 0,1 24,0" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <text x="80" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Agent</text>

  <!-- Speech bubble (top row) -->
  <g class="speech-bubble">
    <rect x="30" y="155" width="100" height="22" rx="6" fill="#1e293b" stroke="#374151" stroke-width="0.8"/>
    <polygon points="65,155 72,148 79,155" fill="#1e293b" stroke="#374151" stroke-width="0.8"/>
    <!-- Cover the bottom edge of triangle inside bubble -->
    <line x1="66" y1="155.5" x2="78" y2="155.5" stroke="#1e293b" stroke-width="1.5"/>
    <text x="80" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#d1d5db" text-anchor="middle">Revenue by region?</text>
  </g>

  <!-- === CONNECTION LINES (top row) === -->
  <!-- Agent → CogniMesh -->
  <line x1="110" y1="120" x2="390" y2="120" stroke="#4b5563" stroke-width="1" class="flow-line-top"/>
  <!-- CogniMesh → DB -->
  <line x1="510" y1="120" x2="760" y2="120" stroke="#4b5563" stroke-width="1" class="flow-line-top"/>

  <!-- Arrow labels -->
  <text x="250" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">request</text>
  <text x="635" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">query</text>

  <!-- === COGNIMESH HUB (top row, centered at x=450, y=120) === -->
  <g class="hub-group">
    <!-- Glow -->
    <circle cx="0" cy="0" r="42" fill="url(#glowPurple)" class="hub-glow"/>
    <!-- Rounded rect background -->
    <rect x="-38" y="-30" width="76" height="60" rx="14" fill="#1a1430" stroke="#8b7cf8" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Mesh network inside: central node + 6 surrounding -->
    <circle cx="0" cy="0" r="4" fill="#8b7cf8"/>
    <!-- Surrounding nodes -->
    <circle cx="-14" cy="-12" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <circle cx="14" cy="-12" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <circle cx="-18" cy="4" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <circle cx="18" cy="4" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <circle cx="-8" cy="16" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <circle cx="8" cy="16" r="2.5" fill="#8b7cf8" fill-opacity="0.7"/>
    <!-- Connection lines inside mesh -->
    <g stroke="#8b7cf8" stroke-width="0.8" stroke-opacity="0.4">
      <line x1="0" y1="0" x2="-14" y2="-12"/>
      <line x1="0" y1="0" x2="14" y2="-12"/>
      <line x1="0" y1="0" x2="-18" y2="4"/>
      <line x1="0" y1="0" x2="18" y2="4"/>
      <line x1="0" y1="0" x2="-8" y2="16"/>
      <line x1="0" y1="0" x2="8" y2="16"/>
      <!-- Outer ring -->
      <line x1="-14" y1="-12" x2="14" y2="-12"/>
      <line x1="14" y1="-12" x2="18" y2="4"/>
      <line x1="18" y1="4" x2="8" y2="16"/>
      <line x1="8" y1="16" x2="-8" y2="16"/>
      <line x1="-8" y1="16" x2="-18" y2="4"/>
      <line x1="-18" y1="4" x2="-14" y2="-12"/>
    </g>
  </g>
  <text x="450" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="600">CogniMesh</text>

  <!-- === DATABASE (top row, centered at x=800, y=120) === -->
  <!-- Cylinder top -->
  <ellipse cx="800" cy="106" rx="22" ry="9" fill="#2dd4bf" fill-opacity="0.15" stroke="#2dd4bf" stroke-width="1.2"/>
  <!-- Cylinder body -->
  <rect x="778" y="106" width="44" height="28" fill="#2dd4bf" fill-opacity="0.08" stroke="none"/>
  <!-- Cylinder bottom -->
  <ellipse cx="800" cy="134" rx="22" ry="9" fill="#2dd4bf" fill-opacity="0.15" stroke="#2dd4bf" stroke-width="1.2"/>
  <!-- Cylinder sides -->
  <line x1="778" y1="106" x2="778" y2="134" stroke="#2dd4bf" stroke-width="1.2"/>
  <line x1="822" y1="106" x2="822" y2="134" stroke="#2dd4bf" stroke-width="1.2"/>
  <!-- Middle ellipse line -->
  <ellipse cx="800" cy="118" rx="22" ry="9" fill="none" stroke="#2dd4bf" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="800" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Gold (DWH)</text>

  <!-- === ANIMATED DOTS (top row) === -->
  <!-- Phase 1: Blue dot Agent→CogniMesh -->
  <circle cx="0" cy="120" r="5" fill="#60a5fa" class="top-req-dot-1"/>
  <!-- Phase 2: Teal dot CogniMesh→DB -->
  <circle cx="0" cy="120" r="5" fill="#2dd4bf" class="top-req-dot-2"/>
  <!-- Phase 3: Green dot DB→CogniMesh -->
  <circle cx="0" cy="120" r="5" fill="#4ade80" class="top-resp-dot-1"/>
  <!-- Phase 4: Green dot CogniMesh→Agent -->
  <circle cx="0" cy="120" r="5" fill="#4ade80" class="top-resp-dot-2"/>

  <!-- Success labels -->
  <g class="top-success-label">
    <rect x="40" y="86" width="50" height="16" rx="4" fill="#065f46" fill-opacity="0.7"/>
    <text x="65" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle" font-weight="600">200 OK</text>
  </g>

  <!-- Green checkmark near agent -->
  <g class="top-check">
    <circle cx="108" cy="100" r="8" fill="#065f46" fill-opacity="0.6"/>
    <path d="M104,100 L107,103 L113,97" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Lineage label near CogniMesh -->
  <text x="450" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6b7280" text-anchor="middle" class="top-lineage-label">lineage + freshness + audit</text>

  <!-- Data label near agent after success -->
  <g class="top-success-label">
    <text x="65" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#4ade80" text-anchor="middle">[revenue data]</text>
  </g>

  <!-- ============================================
       BOTTOM ROW — "Without CogniMesh"
       ============================================ -->

  <!-- Section label -->
  <text x="40" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f87171">Without CogniMesh</text>

  <!-- === AGENT (bottom row, centered at x=80, y=300) === -->
  <circle cx="80" cy="288" r="7" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <path d="M68,310 a12,8 0 0,1 24,0" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <text x="80" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Agent</text>

  <!-- Speech bubble (bottom row) -->
  <g class="speech-bubble" style="animation-delay: 0.5s">
    <rect x="30" y="335" width="100" height="22" rx="6" fill="#1e293b" stroke="#374151" stroke-width="0.8"/>
    <polygon points="65,335 72,328 79,335" fill="#1e293b" stroke="#374151" stroke-width="0.8"/>
    <line x1="66" y1="335.5" x2="78" y2="335.5" stroke="#1e293b" stroke-width="1.5"/>
    <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#d1d5db" text-anchor="middle">Revenue by region?</text>
  </g>

  <!-- === CONNECTION LINE (bottom row) === -->
  <!-- Agent → gap (dim) -->
  <line x1="110" y1="300" x2="400" y2="300" stroke="#374151" stroke-width="1" class="flow-line-bot"/>
  <!-- gap → DB (very dim, broken) -->
  <line x1="500" y1="300" x2="760" y2="300" stroke="#1f2937" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Arrow labels -->
  <text x="250" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#4b5563" text-anchor="middle">request</text>

  <!-- === GAP / NO SERVING LAYER (bottom row, centered at x=450, y=300) === -->
  <rect x="412" y="270" width="76" height="60" rx="14" fill="#111318" stroke="#374151" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Question mark -->
  <text x="450" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#374151" text-anchor="middle" font-weight="300">?</text>
  <text x="450" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">No serving layer</text>

  <!-- === DATABASE (bottom row, centered at x=800, y=300) — dim === -->
  <ellipse cx="800" cy="286" rx="22" ry="9" fill="#4b5563" fill-opacity="0.1" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="778" y="286" width="44" height="28" fill="#4b5563" fill-opacity="0.05" stroke="none"/>
  <ellipse cx="800" cy="314" rx="22" ry="9" fill="#4b5563" fill-opacity="0.1" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="778" y1="286" x2="778" y2="314" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="822" y1="286" x2="822" y2="314" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <ellipse cx="800" cy="298" rx="22" ry="9" fill="none" stroke="#4b5563" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="800" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Gold (DWH)</text>

  <!-- === ANIMATED DOTS (bottom row) === -->
  <!-- Request dot: Agent → gap -->
  <circle cx="0" cy="300" r="5" fill="#60a5fa" class="bot-req-dot"/>
  <!-- Bounce-back dot (red): gap → Agent -->
  <circle cx="0" cy="300" r="5" fill="#f87171" class="bot-bounce-dot"/>

  <!-- Red X at gap -->
  <g class="bot-red-x">
    <circle cx="450" cy="300" r="10" fill="#7f1d1d" fill-opacity="0.5"/>
    <path d="M445,295 L455,305" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
    <path d="M455,295 L445,305" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 404 label -->
  <g class="bot-404-label">
    <rect x="44" y="265" width="36" height="16" rx="4" fill="#7f1d1d" fill-opacity="0.7"/>
    <text x="62" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#f87171" text-anchor="middle" font-weight="700">404</text>
  </g>

  <!-- "no endpoint" label -->
  <text x="450" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6b7280" text-anchor="middle" class="bot-noep-label">no endpoint exposed</text>

  <!-- Red error label near agent -->
  <g class="bot-404-label">
    <text x="62" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#f87171" text-anchor="middle">[no data]</text>
  </g>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <text x="450" y="394" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151" text-anchor="middle">cognimesh.dev</text>
</svg>