<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7cf8"/>
      <stop offset="100%" stop-color="#6d5fd6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Connection lines (mesh) -->
  <g stroke="#8b7cf8" stroke-width="2" stroke-opacity="0.4">
    <!-- Center to outer nodes -->
    <line x1="64" y1="64" x2="32" y2="28"/>
    <line x1="64" y1="64" x2="96" y2="28"/>
    <line x1="64" y1="64" x2="104" y2="64"/>
    <line x1="64" y1="64" x2="96" y2="100"/>
    <line x1="64" y1="64" x2="32" y2="100"/>
    <line x1="64" y1="64" x2="24" y2="64"/>
    <!-- Outer connections -->
    <line x1="32" y1="28" x2="96" y2="28"/>
    <line x1="96" y1="28" x2="104" y2="64"/>
    <line x1="104" y1="64" x2="96" y2="100"/>
    <line x1="96" y1="100" x2="32" y2="100"/>
    <line x1="32" y1="100" x2="24" y2="64"/>
    <line x1="24" y1="64" x2="32" y2="28"/>
  </g>

  <!-- Outer nodes (Silver/data sources) -->
  <circle cx="32" cy="28" r="8" fill="url(#g2)"/>
  <circle cx="96" cy="28" r="8" fill="url(#g2)"/>
  <circle cx="104" cy="64" r="7" fill="#4ade80"/>
  <circle cx="96" cy="100" r="8" fill="url(#g2)"/>
  <circle cx="32" cy="100" r="7" fill="#4ade80"/>
  <circle cx="24" cy="64" r="8" fill="url(#g2)"/>

  <!-- Center node (CogniMesh gateway) -->
  <circle cx="64" cy="64" r="18" fill="url(#g1)" stroke="#8b7cf8" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Center icon: simplified mesh/brain symbol -->
  <g stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M56 60 L64 54 L72 60"/>
    <path d="M56 68 L64 74 L72 68"/>
    <path d="M56 60 L56 68"/>
    <path d="M72 60 L72 68"/>
    <path d="M64 54 L64 74"/>
  </g>
</svg>
