<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowCoral" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f87171"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(139,124,248,0.7)"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#0d0f12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#8b7cf8" font-size="14" font-weight="bold" font-family="system-ui,sans-serif" letter-spacing="1">THREE-TIER QUERY ROUTING</text>

  <!-- ===== LEFT: Agent bubble ===== -->
  <circle cx="52" cy="190" r="18" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <path d="M52,183 a3.5,3.5 0 1,1 0,0.01 M45,199 a7,5.5 0 0,1 14,0" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="18" y="214" width="68" height="22" rx="8" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="0.8" stroke-opacity="0.5"/>
  <path d="M52,214 l-3,-5 l6,0 Z" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="52" y="228" text-anchor="middle" fill="#93c5fd" font-size="9" font-family="system-ui,sans-serif">Question</text>
  <text x="52" y="252" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="8" font-family="system-ui,sans-serif">Agent</text>

  <!-- Arrow: Agent → UC Match diamond -->
  <line x1="90" y1="190" x2="140" y2="190" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== CENTER: UC Match? diamond ===== -->
  <polygon points="190,155 240,190 190,225 140,190" fill="rgba(139,124,248,0.1)" stroke="#8b7cf8" stroke-width="1.5"/>
  <text x="190" y="187" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">UC</text>
  <text x="190" y="199" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">Match?</text>

  <!-- ===== TOP PATH (Green): Yes + Fresh → T0 ===== -->
  <!-- Arrow up-right from diamond to T0 -->
  <path d="M215,165 L260,85" fill="none" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="225" y="118" fill="#4ade80" font-size="9" font-family="system-ui,sans-serif" transform="rotate(-30,225,118)">Yes + Fresh</text>

  <!-- T0 Box -->
  <rect x="262" y="56" width="170" height="56" rx="8" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="276" y="74" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui,sans-serif" letter-spacing="0.5">T0</text>
  <text x="296" y="74" fill="#bbf7d0" font-size="11" font-weight="bold" font-family="system-ui,sans-serif">Pre-built Gold</text>
  <text x="276" y="92" fill="rgba(187,247,208,0.6)" font-size="9" font-family="system-ui,sans-serif">&lt; 10ms · materialized view</text>

  <!-- Arrow: T0 → Response -->
  <line x1="432" y1="84" x2="570" y2="84" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- ===== MIDDLE PATH (Amber): No match → Can compose? → T2 ===== -->
  <!-- Arrow right from diamond -->
  <line x1="240" y1="190" x2="290" y2="190" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="265" y="183" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="system-ui,sans-serif">No</text>

  <!-- Can compose? diamond -->
  <polygon points="340,160 385,190 340,220 295,190" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="340" y="187" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="bold" font-family="system-ui,sans-serif">Can</text>
  <text x="340" y="198" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="bold" font-family="system-ui,sans-serif">compose?</text>

  <!-- Arrow right from compose diamond → T2 -->
  <line x1="385" y1="190" x2="420" y2="190" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="403" y="183" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="system-ui,sans-serif">Yes</text>

  <!-- T2 Box -->
  <rect x="422" y="162" width="195" height="56" rx="8" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="436" y="180" fill="#f59e0b" font-size="9" font-weight="bold" font-family="system-ui,sans-serif" letter-spacing="0.5">T2</text>
  <text x="458" y="180" fill="#fef3c7" font-size="11" font-weight="bold" font-family="system-ui,sans-serif">Composed from Silver</text>
  <text x="436" y="198" fill="rgba(254,243,199,0.6)" font-size="9" font-family="system-ui,sans-serif">guardrails applied · 6 safety layers</text>

  <!-- Arrow: T2 → Response -->
  <line x1="617" y1="190" x2="650" y2="190" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- ===== BOTTOM PATH (Coral): No → T3 ===== -->
  <!-- Arrow down-right from compose diamond -->
  <path d="M360,220 L410,290" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowCoral)"/>
  <text x="373" y="262" fill="#f87171" font-size="9" font-family="system-ui,sans-serif" transform="rotate(30,373,262)">No</text>

  <!-- T3 Box -->
  <rect x="412" y="272" width="205" height="56" rx="8" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="1.5"/>
  <text x="426" y="290" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui,sans-serif" letter-spacing="0.5">T3</text>
  <text x="448" y="290" fill="#fecaca" font-size="11" font-weight="bold" font-family="system-ui,sans-serif">Structured Explanation</text>
  <text x="426" y="308" fill="rgba(254,202,202,0.6)" font-size="9" font-family="system-ui,sans-serif">suggests alternatives · why rejected</text>

  <!-- Arrow: T3 → Response -->
  <line x1="617" y1="300" x2="650" y2="300" stroke="#f87171" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowCoral)"/>

  <!-- ===== RIGHT: Response box ===== -->
  <rect x="655" y="60" width="120" height="268" rx="10" fill="rgba(139,124,248,0.06)" stroke="#8b7cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="715" y="170" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Response</text>

  <!-- Response metadata labels -->
  <text x="715" y="198" text-anchor="middle" fill="rgba(196,181,253,0.5)" font-size="8" font-family="system-ui,sans-serif">+ lineage</text>
  <text x="715" y="212" text-anchor="middle" fill="rgba(196,181,253,0.5)" font-size="8" font-family="system-ui,sans-serif">+ freshness</text>
  <text x="715" y="226" text-anchor="middle" fill="rgba(196,181,253,0.5)" font-size="8" font-family="system-ui,sans-serif">+ audit</text>

  <!-- Bottom tagline -->
  <text x="400" y="365" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" font-family="system-ui,sans-serif" letter-spacing="0.5">Every question gets an answer, a composed attempt, or a meaningful explanation</text>
</svg>
