  <!-- Left arrow: Gateway -> Gold Layer -->
  <line x1="220" y1="385" x2="220" y2="425" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right arrow: Gateway -> Lifecycle Engine -->
  <line x1="580" y1="385" x2="580" y2="425" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== GOLD LAYER (left side) ===== -->
  <rect x="50" y="425" width="340" height="110" rx="8" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1" stroke-opacity="0.3"/>
  <text x="220" y="452" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">GOLD LAYER</text>
  <text x="220" y="474" text-anchor="middle" fill="#e8e6df" font-size="13" font-family="system-ui,sans-serif">Consolidated views</text>
  <text x="220" y="496" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">7 views serve 20 UCs</text>
  <text x="220" y="516" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Pre-computed, instant (T0)</text>

  <!-- ===== LIFECYCLE ENGINE (right side) ===== -->
  <rect x="420" y="425" width="340" height="110" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="590" y="452" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">LIFECYCLE ENGINE</text>
  <text x="590" y="474" text-anchor="middle" fill="#e8e6df" font-size="13" font-family="system-ui,sans-serif">UC Registration</text>
  <text x="590" y="492" text-anchor="middle" fill="#e8e6df" font-size="13" font-family="system-ui,sans-serif">Gold Derivation</text>
  <text x="590" y="510" text-anchor="middle" fill="#e8e6df" font-size="13" font-family="system-ui,sans-serif">Consolidation + Smart Refresh</text>
  <text x="590" y="524" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">TTL Management</text>

  <!-- Arrow: Lifecycle Engine -> Gold (horizontal, labeled) -->
  <line x1="420" y1="475" x2="395" y2="475" stroke="rgba(74,222,128,0.6)" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="407" y="465" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui,sans-serif" transform="rotate(-90,407,465)">creates / refreshes</text>

  <!-- Arrow: Gold -> Silver (derived from) -->
  <line x1="220" y1="535" x2="220" y2="575" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="232" y="558" text-anchor="start" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">derived from</text>

  <!-- Arrow: Silver -> Lifecycle Engine (monitors) -->
  <line x1="580" y1="575" x2="580" y2="540" stroke="rgba(245,158,11,0.6)" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="592" y="558" text-anchor="start" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">monitors</text>

  <!-- ===== SILVER LAYER ===== -->
  <rect x="50" y="575" width="700" height="80" rx="8" fill="rgba(45,212,191,0.1)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="600" text-anchor="middle" fill="#2dd4bf" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">SILVER LAYER</text>
  <text x="400" y="620" text-anchor="middle" fill="#e8e6df" font-size="12" font-family="'SF Mono','Monaco','Courier New',monospace">customer_profiles    product_metrics    orders_enriched</text>
  <text x="400" y="640" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Postgres LISTEN/NOTIFY on changes</text>

  <!-- Arrow: Silver -> Bronze (cleaned from) -->
  <line x1="400" y1="655" x2="400" y2="685" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="412" y="674" text-anchor="start" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">cleaned from</text>

  <!-- ===== BRONZE LAYER ===== -->
  <rect x="50" y="685" width="700" height="55" rx="8" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="708" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">BRONZE LAYER</text>
  <text x="400" y="728" text-anchor="middle" fill="#e8e6df" font-size="12" font-family="'SF Mono','Monaco','Courier New',monospace">customers  |  products  |  orders  (raw)</text>

  <!-- ===== SELF-IMPROVING LOOP (Phase 2) ===== -->
  <rect x="50" y="762" width="700" height="78" rx="8" fill="rgba(139,124,248,0.06)" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6,4"/>
  <text x="400" y="784" text-anchor="middle" fill="#8b7cf8" font-size="14" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace" fill-opacity="0.7">SELF-IMPROVING LOOP (Phase 2)</text>
  <text x="400" y="806" text-anchor="middle" fill="#e8e6df" font-size="11" font-family="system-ui,sans-serif" fill-opacity="0.7">Agent asks unsupported question  -->  T2 serves from Silver  -->  Audit detects pattern (47 hits / 7 days)</text>
  <text x="400" y="824" text-anchor="middle" fill="#e8e6df" font-size="11" font-family="system-ui,sans-serif" fill-opacity="0.7">-->  UC candidate generated  -->  Human approves  -->  Gold view created  -->  T0 (85x faster)</text>
</svg>
