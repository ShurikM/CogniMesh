<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="800" height="850">
  <defs>
    <marker id="arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(255,255,255,0.5)"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(74,222,128,0.6)"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="rgba(245,158,11,0.6)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="850" fill="#0d0f12"/>

  <!-- ===== AI AGENTS (top) ===== -->
  <rect x="240" y="20" width="320" height="60" rx="8" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="46" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">AI AGENTS</text>
  <text x="400" y="66" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Any LLM / framework / MCP client</text>

  <!-- Arrow: Agents -> Gateway -->
  <line x1="400" y1="80" x2="400" y2="125" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- API labels -->
  <text x="340" y="100" text-anchor="end" fill="#9ca3af" font-size="10" font-family="'SF Mono','Monaco','Courier New',monospace">POST /query</text>
  <text x="340" y="113" text-anchor="end" fill="#9ca3af" font-size="10" font-family="'SF Mono','Monaco','Courier New',monospace">GET /deps</text>
  <text x="460" y="100" text-anchor="start" fill="#9ca3af" font-size="10" font-family="'SF Mono','Monaco','Courier New',monospace">GET /discover</text>
  <text x="460" y="113" text-anchor="start" fill="#9ca3af" font-size="10" font-family="'SF Mono','Monaco','Courier New',monospace">GET /refresh</text>

  <!-- ===== COGNIMESH GATEWAY (large central box) ===== -->
  <rect x="40" y="125" width="720" height="260" rx="8" fill="rgba(139,124,248,0.12)" stroke="#8b7cf8" stroke-width="2" stroke-opacity="0.3"/>
  <text x="400" y="152" text-anchor="middle" fill="#8b7cf8" font-size="16" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">COGNIMESH GATEWAY</text>

  <!-- Row 1: Capability Index + Dependency Graph -->
  <rect x="68" y="168" width="210" height="76" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.25"/>
  <text x="173" y="190" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">Capability Index</text>
  <text x="173" y="208" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">UC matching</text>
  <text x="173" y="224" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Discovery</text>

  <rect x="298" y="168" width="210" height="76" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.25"/>
  <text x="403" y="190" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">Dependency Graph</text>
  <text x="403" y="208" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Impact analysis</text>
  <text x="403" y="224" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Provenance</text>

  <!-- Row 2: Query Router + Observability -->
  <rect x="68" y="256" width="210" height="112" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.25"/>
  <text x="173" y="278" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">Query Router</text>
  <text x="173" y="300" text-anchor="middle" fill="#4ade80" font-size="11" font-family="'SF Mono','Monaco','Courier New',monospace">T0 -> Gold</text>
  <text x="173" y="318" text-anchor="middle" fill="#2dd4bf" font-size="11" font-family="'SF Mono','Monaco','Courier New',monospace">T2 -> Silver</text>
  <text x="173" y="336" text-anchor="middle" fill="#f87171" font-size="11" font-family="'SF Mono','Monaco','Courier New',monospace">T3 -> Reject</text>

  <rect x="298" y="256" width="210" height="112" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.25"/>
  <text x="403" y="278" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="'SF Mono','Monaco','Courier New',monospace">Observability</text>
  <text x="403" y="300" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Lineage tracking</text>
  <text x="403" y="318" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Audit trail</text>
  <text x="403" y="336" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Cost tracking</text>
  <text x="403" y="354" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Freshness</text>

  <!-- Right side gateway placeholder for visual balance -->
  <rect x="528" y="168" width="210" height="200" rx="8" fill="rgba(139,124,248,0.06)" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  <text x="633" y="260" text-anchor="middle" fill="#8b7cf8" font-size="12" font-family="system-ui,sans-serif" fill-opacity="0.5">Response envelope</text>
  <text x="633" y="278" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif" fill-opacity="0.5">data + lineage</text>
  <text x="633" y="296" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif" fill-opacity="0.5">+ freshness</text>
  <text x="633" y="314" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif" fill-opacity="0.5">+ cost</text>

