<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7cf8"/>
      <stop offset="100%" stop-color="#6d5fd6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="700" rx="12" fill="#0d0f12"/>

  <!-- ===== LAYER 1: AI Agents (top) ===== -->
  <rect x="60" y="24" width="480" height="72" rx="12" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="60" y="24" width="480" height="72" rx="12" fill="#60a5fa" fill-opacity="0.1"/>
  <text x="300" y="52" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold">AI Agents</text>
  <text x="300" y="76" text-anchor="middle" fill="#9ca3af" font-size="12">Any LLM / framework / MCP client</text>

  <!-- Arrow: Agents -> Gateway -->
  <line x1="300" y1="96" x2="300" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="316" y="118" fill="#6b7280" font-size="10">POST /query</text>

  <!-- ===== LAYER 2: CogniMesh Gateway (middle) ===== -->
  <rect x="40" y="140" width="520" height="240" rx="12" fill="none" stroke="#8b7cf8" stroke-width="2" stroke-opacity="0.7"/>
  <rect x="40" y="140" width="520" height="240" rx="12" fill="#8b7cf8" fill-opacity="0.08"/>
  <text x="300" y="168" text-anchor="middle" fill="#8b7cf8" font-size="16" font-weight="bold">CogniMesh Gateway</text>

  <!-- Inner boxes row 1 -->
  <rect x="68" y="184" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="138" y="211" text-anchor="middle" fill="#c4b5fd" font-size="12">UC Registry</text>

  <rect x="228" y="184" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="298" y="211" text-anchor="middle" fill="#c4b5fd" font-size="12">Dependency Graph</text>

  <rect x="388" y="184" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="458" y="211" text-anchor="middle" fill="#c4b5fd" font-size="12">Lineage + Audit</text>

  <!-- Inner boxes row 2 -->
  <rect x="68" y="240" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="138" y="267" text-anchor="middle" fill="#c4b5fd" font-size="12">Smart Refresh</text>

  <rect x="228" y="240" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="298" y="267" text-anchor="middle" fill="#c4b5fd" font-size="12">Query Composer</text>

  <rect x="388" y="240" width="140" height="44" rx="8" fill="#1a1c22" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="458" y="267" text-anchor="middle" fill="#c4b5fd" font-size="12">Freshness Monitor</text>

  <!-- Tier routing bar -->
  <rect x="68" y="300" width="228" height="56" rx="8" fill="#1a1c22" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="116" y="323" fill="#4ade80" font-size="11" font-weight="bold">T0: Gold</text>
  <text x="116" y="340" fill="#9ca3af" font-size="10">instant, pre-computed</text>

  <rect x="312" y="300" width="216" height="56" rx="8" fill="#1a1c22" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.5"/>
  <text x="352" y="323" fill="#2dd4bf" font-size="11" font-weight="bold">T2: Silver</text>
  <text x="352" y="340" fill="#9ca3af" font-size="10">composed, fallback</text>

  <!-- Arrow: Gateway -> Gold -->
  <line x1="300" y1="380" x2="300" y2="420" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== LAYER 3: Gold ===== -->
  <rect x="80" y="420" width="440" height="60" rx="10" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="80" y="420" width="440" height="60" rx="10" fill="#4ade80" fill-opacity="0.08"/>
  <text x="300" y="446" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">Gold Layer</text>
  <text x="300" y="466" text-anchor="middle" fill="#9ca3af" font-size="11">7 consolidated views serving 20 use cases</text>

  <!-- Arrow: Gold -> Silver -->
  <line x1="300" y1="480" x2="300" y2="516" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="316" y="502" fill="#6b7280" font-size="10">derived from</text>

  <!-- ===== LAYER 4: Silver ===== -->
  <rect x="80" y="516" width="440" height="60" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="80" y="516" width="440" height="60" rx="10" fill="#2dd4bf" fill-opacity="0.08"/>
  <text x="300" y="542" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="bold">Silver Layer</text>
  <text x="300" y="562" text-anchor="middle" fill="#9ca3af" font-size="11">customer_profiles  |  product_metrics  |  orders_enriched</text>

  <!-- Arrow: Silver -> Bronze -->
  <line x1="300" y1="576" x2="300" y2="612" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="316" y="598" fill="#6b7280" font-size="10">cleaned from</text>

  <!-- ===== LAYER 5: Bronze ===== -->
  <rect x="80" y="612" width="440" height="60" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="80" y="612" width="440" height="60" rx="10" fill="#f59e0b" fill-opacity="0.08"/>
  <text x="300" y="638" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Bronze Layer</text>
  <text x="300" y="658" text-anchor="middle" fill="#9ca3af" font-size="11">customers  |  products  |  orders  (raw data)</text>
</svg>
