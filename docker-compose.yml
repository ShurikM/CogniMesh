services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cognimesh
      POSTGRES_PASSWORD: cognimesh
      POSTGRES_DB: cognimesh_bench
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./benchmark/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognimesh"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
